

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hously Finntech Realty</title>
    
    <!-- Default favicon (fallback) -->
    <link id="favicon" rel="icon" type="image/x-icon" href="/favicon.png">
    
    <!-- Add Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Script to dynamically update favicon -->
    <script>
      function updateFavicon(faviconUrl) {
        const link = document.createElement('link');
        link.type = 'image/x-icon';
        link.rel = 'shortcut icon';
        
        const timestamp = new Date().getTime();
        link.href = faviconUrl.includes('?') 
          ? `${faviconUrl}&t=${timestamp}` 
          : `${faviconUrl}?t=${timestamp}`;
        
        const existingLink = document.querySelector("link[rel*='icon']");
        if (existingLink) {
          document.head.removeChild(existingLink);
        }
        document.head.appendChild(link);
      }

      async function fetchFavicon() {
        try {
          const response = await fetch('/api/settings/logos');
          
          if (response.ok) {
            const data = await response.json();
            if (data.success && data.data && data.data.favicon) {
              updateFavicon(data.data.favicon);
            } else {
              updateFavicon('/favicon.png');
            }
          } else {
            updateFavicon('/favicon.png');
          }
        } catch (error) {
          console.error('❌ Error fetching favicon:', error);
          updateFavicon('/favicon.png');
        }
      }

      document.addEventListener('DOMContentLoaded', fetchFavicon);
      
      document.addEventListener('visibilitychange', function() {
        if (!document.hidden) {
          fetchFavicon();
        }
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
