<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hously Finntech Realty</title>
    
    <!-- Default favicon (fallback) -->
    <link id="favicon" rel="icon" type="image/x-icon" href="/favicon.png">
    
    <!-- Add Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Script to dynamically update favicon -->
    <script>
      // Function to update favicon
      function updateFavicon(faviconUrl) {
        const link = document.querySelector("link[rel*='icon']") || document.createElement('link');
        link.type = 'image/x-icon';
        link.rel = 'shortcut icon';
        link.href = faviconUrl;
        link.id = 'favicon';
        
        // Add cache busting
        const timestamp = new Date().getTime();
        link.href = faviconUrl.includes('?') 
          ? `${faviconUrl}&t=${timestamp}` 
          : `${faviconUrl}?t=${timestamp}`;
        
        // Remove existing favicon
        const existingLink = document.querySelector("link[rel*='icon']");
        if (existingLink) {
          document.head.removeChild(existingLink);
        }
        
        // Add new favicon
        document.head.appendChild(link);
      }

      // Function to fetch favicon from API
      async function fetchFavicon() {
        try {
          
          const response = await fetch('http://localhost:5000/api/settings/logos');
          
          if (response.ok) {
            const data = await response.json();
            
            if (data.success && data.data && data.data.favicon) {
              // Update favicon with the one from API
              updateFavicon(data.data.favicon);
            } else {
              // Use default favicon with cache busting
              const timestamp = new Date().getTime();
              updateFavicon(`/favicon.png?t=${timestamp}`);
            }
          } else {
            console.error('❌ API request failed:', response.status);
            // Use default favicon
            const timestamp = new Date().getTime();
            updateFavicon(`/favicon.png?t=${timestamp}`);
          }
        } catch (error) {
          console.error('❌ Error fetching favicon:', error);
          // Use default favicon
          const timestamp = new Date().getTime();
          updateFavicon(`/favicon.png?t=${timestamp}`);
        }
      }

      // Fetch favicon when page loads
      document.addEventListener('DOMContentLoaded', fetchFavicon);
      
      // Also update favicon when visibility changes (for browser tab switching)
      document.addEventListener('visibilitychange', function() {
        if (!document.hidden) {
          // Refresh favicon when tab becomes visible
          fetchFavicon();
        }
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
